name: Scrape NCHL stats

on:
  workflow_dispatch:        # manual run button
  schedule:
    - cron: "0 12 * * *"    # daily at 12:00 UTC = 6am Mountain

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python scrape.py
      - run: python scrape_ashl.py
        env:
          ASHL_SEED_TOKEN: ${{ secrets.ASHL_SEED_TOKEN }}
      
      - name: Commit results
        run: |
          git config user.name "stats-bot"
          git config user.email "bot@users.noreply.github.com"
          git add *.csv
          git diff --cached --quiet || git commit -m "Stats refresh $(date -u +%F)"
          git push
